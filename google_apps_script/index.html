<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SITREP Assistant</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: #f8fafc;
    color: #1e293b;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Header ── */
  .header {
    background: linear-gradient(135deg, #1e3a5f 0%, #0a1628 100%);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }
  .logo {
    width: 36px; height: 36px; border-radius: 8px;
    background: linear-gradient(135deg, #38bdf8, #3b82f6);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; font-weight: 700; color: #fff;
  }
  .header-text { flex: 1; }
  .header-title { color: #f1f5f9; font-size: 15px; font-weight: 700; }
  .header-sub   { color: #94a3b8; font-size: 11px; margin-top: 1px; }
  .admin-toggle {
    background: none; border: 1px solid #334155; color: #94a3b8;
    border-radius: 6px; padding: 4px 10px; font-size: 11px; cursor: pointer;
    font-family: inherit;
  }
  .admin-toggle:hover { border-color: #64748b; color: #cbd5e1; }

  /* ── Messages area ── */
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 14px 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    scroll-behavior: smooth;
  }

  /* ── Suggestions ── */
  .suggestions { padding: 4px 0 8px; }
  .suggestions p { font-size: 13px; font-weight: 600; color: #475569; margin-bottom: 8px; }
  .suggestion-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
  .sugg-btn {
    background: #f0f7ff; border: 1px solid #bfdbfe; border-radius: 8px;
    padding: 8px 10px; font-size: 12px; color: #1e40af; cursor: pointer;
    text-align: left; font-family: inherit; line-height: 1.3;
    transition: background 0.15s;
  }
  .sugg-btn:hover { background: #dbeafe; }

  /* ── Chat bubbles ── */
  .msg { display: flex; gap: 8px; align-items: flex-start; }
  .msg.user { flex-direction: row-reverse; }
  .avatar {
    width: 28px; height: 28px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700; flex-shrink: 0;
  }
  .msg.assistant .avatar { background: linear-gradient(135deg, #38bdf8, #3b82f6); color: #fff; }
  .msg.user      .avatar { background: #e2e8f0; color: #475569; }
  .bubble {
    max-width: 78%;
    padding: 9px 13px;
    border-radius: 12px;
    font-size: 13px;
    line-height: 1.55;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .msg.assistant .bubble { background: #fff; border: 1px solid #e2e8f0; color: #1e293b; }
  .msg.user      .bubble { background: #1e40af; color: #fff; }

  /* ── Typing indicator ── */
  .typing .bubble { padding: 12px 16px; }
  .dots { display: flex; gap: 4px; align-items: center; }
  .dots span {
    width: 6px; height: 6px; border-radius: 50%;
    background: #94a3b8; animation: bounce 1.2s infinite;
  }
  .dots span:nth-child(2) { animation-delay: 0.2s; }
  .dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 80%, 100% { transform: translateY(0); }
    40%            { transform: translateY(-5px); }
  }

  /* ── Input bar ── */
  .input-bar {
    padding: 10px 14px 14px;
    background: #fff;
    border-top: 1px solid #e2e8f0;
    display: flex;
    gap: 8px;
    align-items: flex-end;
    flex-shrink: 0;
  }
  #user-input {
    flex: 1;
    border: 1px solid #cbd5e1;
    border-radius: 10px;
    padding: 9px 12px;
    font-size: 13px;
    font-family: inherit;
    resize: none;
    outline: none;
    min-height: 40px;
    max-height: 100px;
    line-height: 1.4;
    color: #1e293b;
  }
  #user-input:focus { border-color: #3b82f6; }
  #send-btn {
    background: #1e40af; color: #fff; border: none; border-radius: 10px;
    width: 40px; height: 40px; cursor: pointer; display: flex;
    align-items: center; justify-content: center; flex-shrink: 0;
    font-size: 16px;
  }
  #send-btn:disabled { background: #94a3b8; cursor: not-allowed; }
  #send-btn:hover:not(:disabled) { background: #1d4ed8; }

  /* ── Clear button ── */
  .clear-bar {
    padding: 0 14px 10px;
    background: #fff;
    flex-shrink: 0;
  }
  .clear-btn {
    background: none; border: none; color: #94a3b8; font-size: 12px;
    cursor: pointer; font-family: inherit; padding: 0;
  }
  .clear-btn:hover { color: #64748b; }

  /* ── Admin panel ── */
  #admin-panel {
    display: none;
    padding: 14px 16px;
    background: #fff;
    border-top: 1px solid #e2e8f0;
    flex-shrink: 0;
    max-height: 300px;
    overflow-y: auto;
  }
  #admin-panel h3 { font-size: 13px; font-weight: 700; margin-bottom: 8px; color: #1e293b; }
  #admin-panel p  { font-size: 11px; color: #64748b; margin-bottom: 8px; line-height: 1.4; }
  .admin-row { display: flex; gap: 6px; margin-bottom: 8px; }
  .admin-input {
    flex: 1; border: 1px solid #cbd5e1; border-radius: 8px;
    padding: 7px 10px; font-size: 12px; font-family: inherit; outline: none;
  }
  .admin-input:focus { border-color: #3b82f6; }
  .admin-btn {
    background: #1e40af; color: #fff; border: none; border-radius: 8px;
    padding: 7px 14px; font-size: 12px; cursor: pointer; font-family: inherit;
    white-space: nowrap;
  }
  .admin-btn:hover { background: #1d4ed8; }
  .admin-btn.secondary {
    background: #f1f5f9; color: #475569; border: 1px solid #cbd5e1;
  }
  .admin-btn.secondary:hover { background: #e2e8f0; }
  #kb-textarea {
    width: 100%; min-height: 100px; border: 1px solid #cbd5e1;
    border-radius: 8px; padding: 8px 10px; font-size: 12px; font-family: inherit;
    resize: vertical; outline: none; margin-bottom: 6px;
  }
  #kb-textarea:focus { border-color: #3b82f6; }
  .admin-status { font-size: 11px; margin-top: 4px; }
  .admin-status.ok    { color: #16a34a; }
  .admin-status.error { color: #dc2626; }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="logo">S</div>
  <div class="header-text">
    <div class="header-title">SITREP Assistant</div>
    <div class="header-sub">Your internal resource hub AI</div>
  </div>
  <button class="admin-toggle" onclick="toggleAdmin()">Admin</button>
</div>

<!-- Messages -->
<div id="messages">
  <div class="suggestions" id="suggestions">
    <p>Try asking:</p>
    <div class="suggestion-grid">
      <button class="sugg-btn" onclick="sendSuggestion(this)">What is Project SITREP?</button>
      <button class="sugg-btn" onclick="sendSuggestion(this)">How do I submit a help desk ticket?</button>
      <button class="sugg-btn" onclick="sendSuggestion(this)">Where can I find the team directory?</button>
      <button class="sugg-btn" onclick="sendSuggestion(this)">What tools do we use?</button>
    </div>
  </div>
</div>

<!-- Clear bar (hidden until there are messages) -->
<div class="clear-bar" id="clear-bar" style="display:none">
  <button class="clear-btn" onclick="clearChat()">Clear conversation</button>
</div>

<!-- Input -->
<div class="input-bar">
  <textarea id="user-input" rows="1"
    placeholder="Ask about SITREP resources, policies, tools..."
    onkeydown="handleKey(event)"
    oninput="autoResize(this)"></textarea>
  <button id="send-btn" onclick="sendMessage()" title="Send">&#9658;</button>
</div>

<!-- Admin panel -->
<div id="admin-panel">
  <h3>Knowledge Base — Admin</h3>
  <p>Paste extra content from your Google Intranet pages. Saved permanently in Script Properties.</p>

  <div class="admin-row" id="pw-row">
    <input class="admin-input" type="password" id="admin-pw" placeholder="Admin password">
    <button class="admin-btn" onclick="adminLoad()">Unlock</button>
  </div>

  <div id="kb-editor" style="display:none">
    <textarea id="kb-textarea" placeholder="Paste additional Google Sites content here..."></textarea>
    <div style="display:flex; gap:6px">
      <button class="admin-btn" onclick="adminSave()">Save</button>
      <button class="admin-btn secondary" onclick="lockAdmin()">Lock</button>
    </div>
    <div class="admin-status" id="admin-status"></div>
  </div>
</div>

<script>
  // ── State ──────────────────────────────────────────────────
  const history = [];   // [{role, content}, ...]
  let busy = false;
  let adminUnlocked = false;

  // ── Auto-resize textarea ───────────────────────────────────
  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 100) + 'px';
  }

  // ── Send on Enter (Shift+Enter = newline) ──────────────────
  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  // ── Suggestion click ───────────────────────────────────────
  function sendSuggestion(btn) {
    const text = btn.innerText;
    document.getElementById('user-input').value = text;
    sendMessage();
  }

  // ── Clear conversation ─────────────────────────────────────
  function clearChat() {
    history.length = 0;
    const msgs = document.getElementById('messages');
    msgs.innerHTML = '';
    msgs.appendChild(buildSuggestions());
    document.getElementById('clear-bar').style.display = 'none';
  }

  function buildSuggestions() {
    const div = document.createElement('div');
    div.className = 'suggestions';
    div.id = 'suggestions';
    div.innerHTML = `
      <p>Try asking:</p>
      <div class="suggestion-grid">
        <button class="sugg-btn" onclick="sendSuggestion(this)">What is Project SITREP?</button>
        <button class="sugg-btn" onclick="sendSuggestion(this)">How do I submit a help desk ticket?</button>
        <button class="sugg-btn" onclick="sendSuggestion(this)">Where can I find the team directory?</button>
        <button class="sugg-btn" onclick="sendSuggestion(this)">What tools do we use?</button>
      </div>`;
    return div;
  }

  // ── Append a message bubble ────────────────────────────────
  function appendMessage(role, content) {
    const sugg = document.getElementById('suggestions');
    if (sugg) sugg.remove();
    document.getElementById('clear-bar').style.display = 'block';

    const msgs = document.getElementById('messages');
    const div  = document.createElement('div');
    div.className = 'msg ' + role;
    div.innerHTML = `
      <div class="avatar">${role === 'assistant' ? 'S' : 'You'}</div>
      <div class="bubble">${escHtml(content)}</div>`;
    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
    return div;
  }

  // ── Typing indicator ───────────────────────────────────────
  function showTyping() {
    const msgs = document.getElementById('messages');
    const div  = document.createElement('div');
    div.className = 'msg assistant typing';
    div.id = 'typing';
    div.innerHTML = `
      <div class="avatar">S</div>
      <div class="bubble"><div class="dots">
        <span></span><span></span><span></span>
      </div></div>`;
    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function hideTyping() {
    const t = document.getElementById('typing');
    if (t) t.remove();
  }

  // ── Send message ───────────────────────────────────────────
  function sendMessage() {
    if (busy) return;
    const input = document.getElementById('user-input');
    const text  = input.value.trim();
    if (!text) return;

    input.value = '';
    input.style.height = 'auto';
    appendMessage('user', text);
    history.push({ role: 'user', content: text });

    busy = true;
    document.getElementById('send-btn').disabled = true;
    showTyping();

    // Keep last 12 turns to stay within context limits
    const recent = history.slice(-12);

    google.script.run
      .withSuccessHandler(onReply)
      .withFailureHandler(onError)
      .getReply(recent);
  }

  function onReply(result) {
    hideTyping();
    busy = false;
    document.getElementById('send-btn').disabled = false;

    if (result.error) {
      appendMessage('assistant', '⚠️ ' + result.error);
    } else {
      appendMessage('assistant', result.reply);
      history.push({ role: 'assistant', content: result.reply });
    }
  }

  function onError(err) {
    hideTyping();
    busy = false;
    document.getElementById('send-btn').disabled = false;
    appendMessage('assistant', '⚠️ Request failed. Please try again.');
  }

  // ── Escape HTML for safe display ──────────────────────────
  function escHtml(str) {
    return str
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  // ── Admin panel ────────────────────────────────────────────
  function toggleAdmin() {
    const panel = document.getElementById('admin-panel');
    panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
  }

  function adminLoad() {
    const pw = document.getElementById('admin-pw').value;
    google.script.run
      .withSuccessHandler(function(res) {
        if (res.error) {
          setAdminStatus(res.error, true);
        } else {
          adminUnlocked = true;
          document.getElementById('pw-row').style.display = 'none';
          document.getElementById('kb-editor').style.display = 'block';
          document.getElementById('kb-textarea').value = res.content;
          setAdminStatus('Unlocked.', false);
        }
      })
      .withFailureHandler(function() { setAdminStatus('Request failed.', true); })
      .getExtraKb(pw);
  }

  function adminSave() {
    const pw = document.getElementById('admin-pw').value;
    const content = document.getElementById('kb-textarea').value;
    google.script.run
      .withSuccessHandler(function(res) {
        if (res.error) setAdminStatus(res.error, true);
        else           setAdminStatus('Saved!', false);
      })
      .withFailureHandler(function() { setAdminStatus('Save failed.', true); })
      .saveExtraKb(content, pw);
  }

  function lockAdmin() {
    adminUnlocked = false;
    document.getElementById('pw-row').style.display = 'flex';
    document.getElementById('kb-editor').style.display = 'none';
    document.getElementById('admin-pw').value = '';
    setAdminStatus('', false);
    document.getElementById('admin-panel').style.display = 'none';
  }

  function setAdminStatus(msg, isError) {
    const el = document.getElementById('admin-status');
    el.textContent = msg;
    el.className = 'admin-status ' + (isError ? 'error' : 'ok');
  }
</script>
</body>
</html>
